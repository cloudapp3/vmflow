version: 1
control_listen_addr: 127.0.0.1:19090
# control_tls:                       # enable TLS on the control API
#   cert_file: /etc/vmflow/control.crt
#   key_file:  /etc/vmflow/control.key
#   client_ca_file: clients-ca.crt   # optional → require client certs (mTLS)
#   min_version: "1.2"               # "1.2" (default) | "1.3"

log:
  level: info
  format: text # text or json

# The daemon refuses to start if control_listen_addr is non-loopback without auth.
# Bind 127.0.0.1 (default) or enable auth below before exposing it remotely.
# relayctl/vmflow ctl can pass the token with -token or VMFLOW_CONTROL_TOKEN.
auth:
  enabled: false
  tokens:
    - name: admin
      token: change-me
      role: admin

rules:
  - rule_id: ssh-forward
    name: ssh-forward
    protocol: tcp
    listen_addr: 0.0.0.0
    listen_port: 2201
    target_addr: 127.0.0.1
    target_port: 22
    enabled: true
    speed_limit: 0
    max_conn: 0        # 0 = unlimited (not recommended on exposed ports)
    idle_timeout: 300  # seconds; 0 = default 5 min. Reaps silent connections.
    remark: example
