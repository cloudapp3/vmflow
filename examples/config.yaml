version: 1
control_port: 19090 # internal management always binds to 127.0.0.1
udp_max_sessions: 256 # total active UDP sessions across all rules; 0 = default 256; maximum 4096

log:
  level: info
  format: text # text or json

# Optional persistence for cumulative per-rule traffic/denial/drop counters. Live
# connection counts and rates are never restored. Under the installed systemd
# service the default is /var/lib/vmflow/stats.json; otherwise it is stats.json
# beside this config. Relative path values are resolved beside this config.
stats:
  persist: false
  # path: /var/lib/vmflow/stats.json
  flush_interval: 60s # minimum 1s; changing stats settings requires restart

# The management listener is fixed to loopback. vmflow ctl can pass the token
# with -token or VMFLOW_CONTROL_TOKEN.
# Persistent TUI rule edits require auth.enabled: true and an admin token.
# Viewer and auth-disabled TUI sessions are read-only. Auth, TLS, and log
# changes still require editing this YAML and restarting vmflow.
auth:
  enabled: false
  tokens:
    - name: admin
      token: change-me
      role: admin

# Telegram bot (optional). bot_token + bot_chat start a polling bot that only
# responds to that chat. Set bot_control_token to an admin auth token to let the
# bot control forwarding (/reload, /start_rule, /stop, /toggle); leave it unset for a
# read-only bot. Bot control requires auth.enabled: true and an admin token.
# The bot can also be configured and started/stopped at runtime from the TUI
# (press b in the Dashboard or Rules view) without restarting the daemon.
# bot_token: "123456:ABC-DEF..."
# bot_chat: 123456789
# bot_control_token: "change-me"  # must match an admin auth.tokens entry

# The bundled example is loopback-only and disabled so a first launch never
# exposes a new network port. Review the addresses and firewall before enabling.
rules:
  - rule_id: ssh-forward
    name: ssh-forward
    protocol: tcp
    listen_addr: 127.0.0.1
    listen_port: 2201
    target_addr: 127.0.0.1
    target_port: 22
    enabled: false
    speed_limit: 0
    max_conn: 0        # TCP: unlimited; UDP: default 256 sessions
    idle_timeout: 300  # seconds; 0 = default 5 min. Reaps silent connections.
    # Source IP policy: off (default), allowlist, or denylist. Entries are
    # literal IPv4/IPv6 addresses or CIDRs; maximum 256 entries per rule.
    # source_ip_mode: allowlist
    # source_ips:
    #   - 203.0.113.8
    #   - 198.51.100.0/24
    #   - 2001:db8:100::/48
    remark: example
