version: 2

project_name: vmflow

before:
  hooks:
    - go mod verify

builds:
  - id: vmflow
    main: ./cmd/vmflow
    binary: vmflow
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}
    formats: tar.gz
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - LICENSE
      - README.md
      - THIRD_PARTY_NOTICES.md
      - third_party_licenses/**
      - src: examples/config.yaml
        dst: .
        strip_parent: true

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: cloudapp3
    name: vmflow
  draft: false
  prerelease: auto
  mode: replace
