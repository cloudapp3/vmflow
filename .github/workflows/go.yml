name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Run data-path race tests
        run: go test -race ./engine ./metrics ./precheck ./controlapi ./config .

      - name: Run vet
        run: go vet ./...

      - name: Check reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Smoke checks
        run: |
          go run ./cmd/vmflow version
          go run ./cmd/vmflow version -json
          go run ./examples/embedding

      - name: Build primary binary
        run: go build -trimpath -o /tmp/vmflow ./cmd/vmflow

  snapshot:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          args: check

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
